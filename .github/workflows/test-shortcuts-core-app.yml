name: Test Shortcuts Core App

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "core-app/**"
      - "src/lib/shortcuts/**"
      - "src/lib/windows_shortcuts.py"
      - "scripts/validate_shortcuts.py"
      - "scripts/test-shortcuts-integration.ps1"
      - "scripts/test-shortcuts-integration.sh"
      - "requirements.txt"
      - ".github/workflows/test-shortcuts-core-app.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "core-app/**"
      - "src/lib/shortcuts/**"
      - "src/lib/windows_shortcuts.py"
      - "scripts/validate_shortcuts.py"
      - "scripts/test-shortcuts-integration.ps1"
      - "scripts/test-shortcuts-integration.sh"
      - "requirements.txt"
      - ".github/workflows/test-shortcuts-core-app.yml"

permissions:
  contents: read

jobs:
  test-shortcuts:
    name: Test core shortcuts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: .\scripts\test-shortcuts-integration.ps1
          - os: ubuntu-latest
            command: ./scripts/test-shortcuts-integration.sh
          - os: macos-latest
            command: ./scripts/test-shortcuts-integration.sh

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk

      - name: Install Python dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Windows shortcut integration test
        if: runner.os == 'Windows'
        shell: pwsh
        run: ${{ matrix.command }}

      - name: Run Linux shortcut integration test
        if: runner.os == 'Linux'
        shell: bash
        run: |
          chmod +x scripts/test-shortcuts-integration.sh
          xvfb-run -a ${{ matrix.command }}

      - name: Run macOS shortcut integration test
        if: runner.os == 'macOS'
        shell: bash
        run: |
          chmod +x scripts/test-shortcuts-integration.sh
          ${{ matrix.command }}

      - name: Validate shortcut metadata
        shell: bash
        run: python scripts/validate_shortcuts.py
