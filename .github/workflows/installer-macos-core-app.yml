name: Installer macOS Core App

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "core-app/**"
      - "src/lib/shortcuts/**"
      - "src/assets/icon/**"
      - "requirements.txt"
      - "build-compilers/build-mac.sh"
      - ".github/workflows/installer-macos-core-app.yml"

permissions:
  contents: read

jobs:
  build-installer:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build app
        shell: bash
        run: |
          chmod +x build-compilers/build-mac.sh
          ./build-compilers/build-mac.sh

      - name: Build pkg installer
        shell: bash
        run: |
          test -d "dist/Programs Manager.app"
          pkgbuild \
            --component "dist/Programs Manager.app" \
            --install-location /Applications \
            --identifier "com.jlbbarco.programs-manager" \
            "programs-manager-macos-installer.pkg"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: programs-manager-macos-installer.pkg
          path: programs-manager-macos-installer.pkg
          if-no-files-found: error
