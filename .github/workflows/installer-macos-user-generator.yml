name: Installer macOS User Generator

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "user-generator/**"
      - "src/assets/icon/**"
      - "requirements.txt"
      - "build-compilers/build-mac-user-generator.sh"
      - ".github/workflows/installer-macos-user-generator.yml"

permissions:
  contents: read

jobs:
  build-installer:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build app
        shell: bash
        run: |
          chmod +x build-compilers/build-mac-user-generator.sh
          ./build-compilers/build-mac-user-generator.sh

      - name: Build pkg installer
        shell: bash
        run: |
          test -d "dist/Programs Manager User Generator"
          pkgbuild \
            --root "dist/Programs Manager User Generator" \
            --install-location "/Applications/Programs Manager User Generator" \
            --identifier "com.jlbbarco.programs-manager-user-generator" \
            "programs-manager-user-generator-macos-installer.pkg"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: programs-manager-user-generator-macos-installer.pkg
          path: programs-manager-user-generator-macos-installer.pkg
          if-no-files-found: error
