name: Build Multi-Platform User Generator

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "user-generator/**"
      - "src/assets/icon/**"
      - "requirements.txt"
      - "user-generator/build.bat"
      - "user-generator/build.sh"
      - "user-generator/run.ps1"
      - "user-generator/run.sh"
      - ".github/workflows/build-user-generator.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "user-generator/**"
      - "src/assets/icon/**"
      - "requirements.txt"
      - "user-generator/build.bat"
      - "user-generator/build.sh"
      - "user-generator/run.ps1"
      - "user-generator/run.sh"
      - ".github/workflows/build-user-generator.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build user generator (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            script: user-generator/build.bat
            asset: programs-manager-user-generator-windows.zip
          - name: Linux
            os: ubuntu-latest
            script: user-generator/build.sh
            asset: programs-manager-user-generator-linux.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Bump version.txt from version-compiler.txt
        id: bump_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          NEW_VERSION="$(python .github/scripts/bump_version.py "$BRANCH")"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "[programs-manager] version.txt bumped to $NEW_VERSION"

      - name: Persist version bump
        if: matrix.os == 'ubuntu-latest' && github.event_name != 'pull_request'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/version-compiler.txt version.txt
          if git diff --cached --quiet; then
            echo "[programs-manager] No version changes to commit."
            exit 0
          fi
          git commit -m "ci: bump version.txt to ${{ steps.bump_version.outputs.version }} [skip ci]"
          git pull --rebase --autostash origin "${{ github.ref_name }}" || true
          git push origin "HEAD:${{ github.ref_name }}" || echo "[programs-manager] Warning: could not push version bump, a later run will pick it up."

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: call ${{ matrix.script }}

      - name: Build on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x "${{ matrix.script }}"
          ./"${{ matrix.script }}"

      - name: Insert version.txt into Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item -Path "version.txt" -Destination "dist/Programs Manager User Generator/version.txt" -Force

      - name: Insert version.txt into Unix build
        if: runner.os != 'Windows'
        shell: bash
        run: cp version.txt "dist/Programs Manager User Generator/version.txt"

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive -Path "dist/Programs Manager User Generator" -DestinationPath "release/${{ matrix.asset }}" -Force

      - name: Package Unix build
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          tar -czf "release/${{ matrix.asset }}" -C dist "Programs Manager User Generator"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: release/${{ matrix.asset }}
          if-no-files-found: error
