name: Test Shortcuts

on:
    workflow_dispatch:
    push:
        branches:
            - main
            - develop
        paths:
            - main.py
            - src/lib/shortcuts/**
            - scripts/validate_shortcuts.py
            - scripts/test-shortcuts-integration.ps1
            - scripts/test-shortcuts-integration.sh
            - scripts/SHORTCUTS_TESTING.md
            - requirements.txt
            - .github/workflows/test-shortcuts.yml
    pull_request:
        branches:
            - main
            - develop
        paths:
            - main.py
            - src/lib/shortcuts/**
            - scripts/validate_shortcuts.py
            - scripts/test-shortcuts-integration.ps1
            - scripts/test-shortcuts-integration.sh
            - scripts/SHORTCUTS_TESTING.md
            - requirements.txt
            - .github/workflows/test-shortcuts.yml

jobs:
    test-shortcuts:
        name: Test shortcuts on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: windows-latest
                      shell: pwsh
                      install_display: false
                      command: .\scripts\test-shortcuts-integration.ps1

                    - os: ubuntu-latest
                      shell: bash
                      install_display: true
                      command: ./scripts/test-shortcuts-integration.sh

                    - os: macos-latest
                      shell: bash
                      install_display: false
                      command: ./scripts/test-shortcuts-integration.sh

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install Linux display dependencies
              if: matrix.install_display
              shell: bash
              run: |
                  sudo apt-get update
                  sudo apt-get install -y xvfb

            - name: Install Python dependencies
              shell: bash
              run: |
                  python -m pip install --upgrade pip
                  if [ -f requirements.txt ]; then
                    python -m pip install -r requirements.txt
                  fi

            - name: Run Windows shortcut integration test
              if: runner.os == 'Windows'
              shell: pwsh
              run: ${{ matrix.command }}

            - name: Run Unix shortcut integration test
              if: runner.os != 'Windows' && matrix.install_display
              shell: bash
              run: |
                  chmod +x scripts/test-shortcuts-integration.sh
                  xvfb-run -a ${{ matrix.command }}

            - name: Run macOS shortcut integration test
              if: runner.os == 'macOS'
              shell: bash
              run: |
                  chmod +x scripts/test-shortcuts-integration.sh
                  ${{ matrix.command }}

            - name: Validate shortcut metadata
              shell: bash
              run: |
                  python scripts/validate_shortcuts.py
