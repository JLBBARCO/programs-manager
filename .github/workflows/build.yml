name: Build Multi-Platform

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            python-version: "3.12"
            script: build.bat
            artifact-name: windows
            artifact-path: dist/Auto*

          - os: ubuntu-latest
            python-version: "3.12"
            script: build.sh
            artifact-name: linux
            artifact-path: dist/Auto*

          - os: macos-latest
            python-version: "3.12"
            script: build-mac.sh
            artifact-name: macos
            artifact-path: dist/Auto*

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv python3-full

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: ${{ matrix.script }}

      - name: Build on Linux/macOS
        if: runner.os != 'Windows'
        run: |
          chmod +x ./${{ matrix.script }}
          bash ./${{ matrix.script }}

      - name: Package artifacts
        shell: bash
        run: |
          cd dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a -tzip "Auto-Install-Programs-${{ matrix.artifact-name }}.zip" "Auto Install Programs"/*
          else
            tar -czf "Auto-Install-Programs-${{ matrix.artifact-name }}.tar.gz" "Auto Install Programs"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auto-install-programs-${{ matrix.artifact-name }}
          path: dist/Auto-Install-Programs-${{ matrix.artifact-name }}.*
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./releases

      - name: Flatten artifacts
        shell: bash
        run: |
          find ./releases -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec mv {} ./releases/ \;
          find ./releases -type d -empty -delete

      - name: Define release tag and name
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            NAME="Release ${TAG}"
            PRE="false"
          else
            TAG="auto-v$(date -u +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}"
            NAME="Auto Release ${TAG}"
            PRE="false"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRE}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: |
            releases/*.zip
            releases/*.tar.gz
          draft: false
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
