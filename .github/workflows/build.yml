name: Build Multi-Platform

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            python-version: "3.12"
            script: build.bat
            artifact-name: windows
            artifact-path: dist/Auto*

          - os: ubuntu-latest
            python-version: "3.12"
            script: ./build.sh
            artifact-name: linux
            artifact-path: dist/Auto*

          - os: macos-latest
            python-version: "3.12"
            script: ./build-mac.sh
            artifact-name: macos
            artifact-path: dist/Auto*

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv python3-full

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install python@3.12 create-dmg

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: ${{ matrix.script }}

      - name: Build on Linux/macOS
        if: runner.os != 'Windows'
        run: |
          chmod +x ${{ matrix.script }}
          ${{ matrix.script }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: auto-install-programs-${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          retention-days: 30

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./releases

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: releases/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
