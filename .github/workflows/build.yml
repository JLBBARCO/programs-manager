name: Build Multi-Platform

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
      - "**/*.py"
      - "install/**"
      - "README.md"
      - "requirements.txt"
      - "Auto Install Programs.spec"
      - "build.bat"
      - "build.sh"
      - "build-mac.sh"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "**/*.py"
      - "install/**"
      - "README.md"
      - "requirements.txt"
      - "Auto Install Programs.spec"
      - "build.bat"
      - "build.sh"
      - "build-mac.sh"
      - ".github/workflows/**"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      python_changed: ${{ steps.filter.outputs.python }}
      data_changed: ${{ steps.filter.outputs.data }}
      windows_changed: ${{ steps.filter.outputs.windows }}
      linux_changed: ${{ steps.filter.outputs.linux }}
      macos_changed: ${{ steps.filter.outputs.macos }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            python:
              - '**/*.py'
            data:
              - 'install/**'
              - 'README.md'
              - 'Auto Install Programs.spec'
            windows:
              - 'build.bat'
            linux:
              - 'build.sh'
            macos:
              - 'build-mac.sh'

  build:
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.python_changed == 'true' ||
      needs.detect-changes.outputs.data_changed == 'true' ||
      needs.detect-changes.outputs.windows_changed == 'true' ||
      needs.detect-changes.outputs.linux_changed == 'true' ||
      needs.detect-changes.outputs.macos_changed == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            python-version: "3.12"
            script: build.bat
            artifact-name: windows
            artifact-path: dist/Auto*
            launch-path: dist/Auto Install Programs/Auto Install Programs.exe
            build_filter: windows

          - os: ubuntu-latest
            python-version: "3.12"
            script: build.sh
            artifact-name: linux
            artifact-path: dist/Auto*
            launch-path: dist/Auto Install Programs/Auto Install Programs
            build_filter: linux

          - os: macos-latest
            python-version: "3.12"
            script: build-mac.sh
            artifact-name: macos
            artifact-path: dist/Auto*
            launch-path: dist/Auto Install Programs/Auto Install Programs
            build_filter: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Evaluate build condition for ${{ matrix.build_filter }}
        id: should_build
        shell: bash
        run: |
          BUILD_PYTHON="${{ needs.detect-changes.outputs.python_changed }}"
          BUILD_WINDOWS="${{ needs.detect-changes.outputs.windows_changed }}"
          BUILD_LINUX="${{ needs.detect-changes.outputs.linux_changed }}"
          BUILD_MACOS="${{ needs.detect-changes.outputs.macos_changed }}"

          # Se arquivos Python foram alterados, compila tudo
          if [ "$BUILD_PYTHON" == "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Compilando ${{ matrix.build_filter }} porque arquivos Python foram modificados"
            exit 0
          fi

          # Senão, compila apenas se o compilador específico foi alterado
          case "${{ matrix.build_filter }}" in
            windows)
              if [ "$BUILD_WINDOWS" == "true" ]; then
                echo "should_build=true" >> "$GITHUB_OUTPUT"
                echo "Compilando Windows porque build.bat foi modificado"
              else
                echo "should_build=false" >> "$GITHUB_OUTPUT"
                echo "Pulando Windows - build.bat não foi modificado"
              fi
              ;;
            linux)
              if [ "$BUILD_LINUX" == "true" ]; then
                echo "should_build=true" >> "$GITHUB_OUTPUT"
                echo "Compilando Linux porque build.sh foi modificado"
              else
                echo "should_build=false" >> "$GITHUB_OUTPUT"
                echo "Pulando Linux - build.sh não foi modificado"
              fi
              ;;
            macos)
              if [ "$BUILD_MACOS" == "true" ]; then
                echo "should_build=true" >> "$GITHUB_OUTPUT"
                echo "Compilando macOS porque build-mac.sh foi modificado"
              else
                echo "should_build=false" >> "$GITHUB_OUTPUT"
                echo "Pulando macOS - build-mac.sh não foi modificado"
              fi
              ;;
          esac

      - name: Set up Python
        if: steps.should_build.outputs.should_build == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (Linux)
        if: steps.should_build.outputs.should_build == 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv python3-full

      - name: Build on Windows
        if: steps.should_build.outputs.should_build == 'true' && runner.os == 'Windows'
        shell: cmd
        run: ${{ matrix.script }}

      - name: Build on Linux/macOS
        if: steps.should_build.outputs.should_build == 'true' && runner.os != 'Windows'
        run: |
          chmod +x ./${{ matrix.script }}
          bash ./${{ matrix.script }}

      - name: Package artifacts
        if: steps.should_build.outputs.should_build == 'true'
        shell: bash
        run: |
          cd dist
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            7z a -tzip "Auto-Install-Programs-${{ matrix.artifact-name }}.zip" "Auto Install Programs"/*
          else
            tar -czf "Auto-Install-Programs-${{ matrix.artifact-name }}.tar.gz" "Auto Install Programs"
          fi

      - name: Upload artifacts
        if: steps.should_build.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: auto-install-programs-${{ matrix.artifact-name }}
          path: dist/Auto-Install-Programs-${{ matrix.artifact-name }}.*
          retention-days: 30

      - name: Install screenshot dependencies
        if: steps.should_build.outputs.should_build == 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y xvfb x11-utils
          fi
          python -m pip install mss pillow

      - name: Capture screenshot
        if: steps.should_build.outputs.should_build == 'true'
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -s "-screen 0 1920x1080x24" python scripts/ci_screenshot.py screenshots/screenshot-${{ matrix.artifact-name }}.webp --wait-seconds 8 --launch "${{ matrix.launch-path }}"
          else
            python scripts/ci_screenshot.py screenshots/screenshot-${{ matrix.artifact-name }}.webp --wait-seconds 8 --launch "${{ matrix.launch-path }}"
          fi

      - name: Verify screenshot output
        if: steps.should_build.outputs.should_build == 'true'
        shell: bash
        run: |
          test -s "screenshots/screenshot-${{ matrix.artifact-name }}.webp"

      - name: Upload screenshot
        if: steps.should_build.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-${{ matrix.artifact-name }}
          path: screenshots/screenshot-${{ matrix.artifact-name }}.webp
          retention-days: 7

  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./releases
        continue-on-error: true

      - name: Check if artifacts exist
        id: check_artifacts
        shell: bash
        run: |
          if find ./releases -type f \( -name "*.zip" -o -name "*.tar.gz" \) 2>/dev/null | grep -q .; then
            echo "artifacts_exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "artifacts_exist=false" >> "$GITHUB_OUTPUT"
            echo "Nenhum artefato encontrado para criar release"
          fi

      - name: Flatten artifacts
        if: steps.check_artifacts.outputs.artifacts_exist == 'true'
        shell: bash
        run: |
          find ./releases -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec mv {} ./releases/ \;
          find ./releases -type d -empty -delete

      - name: Define release tag and name
        if: steps.check_artifacts.outputs.artifacts_exist == 'true'
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            NAME="Release ${TAG}"
            PRE="false"
          else
            TAG="auto-v$(date -u +'%Y.%m.%d')-${GITHUB_RUN_NUMBER}"
            NAME="Auto Release ${TAG}"
            PRE="false"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRE}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: steps.check_artifacts.outputs.artifacts_exist == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: |
            releases/*.zip
            releases/*.tar.gz
          draft: false
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  assemble-screenshots:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Download screenshot artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: screenshot-*
          path: screenshots
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install assembly dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Assemble thumbnails and write assets
        run: |
          python scripts/assemble_thumbnails.py --windows screenshots/screenshot-windows.webp --linux screenshots/screenshot-linux.webp --macos screenshots/screenshot-macos.webp --out-windows src/assets/img/windows.webp --out-linux src/assets/img/linux.webp --out-macos src/assets/img/macos.webp --output src/assets/img/thumbnail.webp

      - name: Commit and push screenshots
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add src/assets/img/windows.webp src/assets/img/linux.webp src/assets/img/macos.webp src/assets/img/thumbnail.webp || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update platform screenshots and thumbnail"
            git push
          fi
