name: Build Multi-Platform Core App

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "core-app/**"
      - "src/lib/shortcuts/**"
      - "src/lib/windows_shortcuts.py"
      - "src/assets/icon/**"
      - "requirements.txt"
      - "core-app/build.bat"
      - "core-app/build.sh"
      - "core-app/run.ps1"
      - "core-app/run.sh"
      - ".github/workflows/build-core-app.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "core-app/**"
      - "src/lib/shortcuts/**"
      - "src/lib/windows_shortcuts.py"
      - "src/assets/icon/**"
      - "requirements.txt"
      - "core-app/build.bat"
      - "core-app/build.sh"
      - "core-app/run.ps1"
      - "core-app/run.sh"
      - ".github/workflows/build-core-app.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build core app (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    env:
      CODE_SIGN_PFX_BASE64: ${{ secrets.CODE_SIGN_PFX_BASE64 }}
      CODE_SIGN_PFX_PASSWORD: ${{ secrets.CODE_SIGN_PFX_PASSWORD }}
      CODE_SIGN_TIMESTAMP_URL: ${{ secrets.CODE_SIGN_TIMESTAMP_URL || 'http://timestamp.digicert.com' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            script: core-app/build.bat
            asset: programs-manager-windows.zip
          - name: Linux
            os: ubuntu-latest
            script: core-app/build.sh
            asset: programs-manager-linux.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Bump version.txt from version-compiler.txt
        id: bump_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${{ github.ref_name }}"
          fi

          NEW_VERSION="$(python .github/scripts/bump_version.py "$BRANCH")"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "[programs-manager] version.txt bumped to $NEW_VERSION"

      - name: Persist version bump
        if: matrix.os == 'ubuntu-latest' && github.event_name != 'pull_request'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/version-compiler.txt version.txt
          if git diff --cached --quiet; then
            echo "[programs-manager] No version changes to commit."
            exit 0
          fi
          git commit -m "ci: bump version.txt to ${{ steps.bump_version.outputs.version }} [skip ci]"

          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${{ github.ref_name }}"; then
              exit 0
            fi
            echo "[programs-manager] Push rejected (attempt $attempt), rebasing onto latest ${{ github.ref_name }}..."
            git fetch origin "${{ github.ref_name }}"
            if ! git rebase "origin/${{ github.ref_name }}"; then
              git rebase --abort
              sleep $((attempt * 3))
              continue
            fi
            sleep $((attempt * 2))
          done

          echo "[programs-manager] Warning: could not push version bump after multiple attempts; a later run will pick it up."

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: call ${{ matrix.script }}

      - name: Build on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x "${{ matrix.script }}"
          ./"${{ matrix.script }}"

      - name: Code sign Windows executable (optional)
        if: runner.os == 'Windows' && env.CODE_SIGN_PFX_BASE64 != ''
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODE_SIGN_PFX_BASE64))
          $securePassword = ConvertTo-SecureString -String $env:CODE_SIGN_PFX_PASSWORD -Force -AsPlainText

          # Trust the certificate on this disposable runner VM only, so that
          # "signtool verify" below doesn't flag a self-signed root as an
          # error. This has no effect on end-user machines, which must
          # import the public .cer themselves (see README.md).
          try {
              Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\LocalMachine\Root -Password $securePassword | Out-Null
          } catch {
              Write-Host "[programs-manager] Could not add certificate to the local trust store on this runner: $_" -ForegroundColor Yellow
          }

          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -like "*x64*" } |
              Sort-Object FullName -Descending |
              Select-Object -First 1

          if (-not $signtool) {
              throw "signtool.exe not found on this runner."
          }

          & $signtool.FullName sign /f $pfxPath /p $env:CODE_SIGN_PFX_PASSWORD /fd SHA256 /tr $env:CODE_SIGN_TIMESTAMP_URL /td SHA256 "dist/Programs Manager/Programs Manager.exe"
          if ($LASTEXITCODE -ne 0) {
              Remove-Item $pfxPath -Force -ErrorAction SilentlyContinue
              throw "signtool failed with exit code $LASTEXITCODE"
          }

          & $signtool.FullName verify /pa "dist/Programs Manager/Programs Manager.exe"
          if ($LASTEXITCODE -ne 0) {
              Write-Host "[programs-manager] Warning: signtool verify reported an issue (expected for a self-signed certificate whose root isn't trusted here). The signature itself was applied successfully." -ForegroundColor Yellow
          }

          Remove-Item $pfxPath -Force
          Write-Host "[programs-manager] Executable signed successfully."

      - name: Insert version.txt into Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item -Path "version.txt" -Destination "dist/Programs Manager/version.txt" -Force

      - name: Insert version.txt into Unix build
        if: runner.os != 'Windows'
        shell: bash
        run: cp version.txt "dist/Programs Manager/version.txt"

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive -Path "dist/Programs Manager" -DestinationPath "release/${{ matrix.asset }}" -Force

      - name: Package Unix build
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          tar -czf "release/${{ matrix.asset }}" -C dist "Programs Manager"

      - name: Generate checksum
        shell: bash
        run: |
          cd release
          sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
          cat "${{ matrix.asset }}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            release/${{ matrix.asset }}
            release/${{ matrix.asset }}.sha256
          if-no-files-found: error
