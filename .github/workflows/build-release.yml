name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            script: build-user-generator.bat
            asset: programs-manager-user-generator-windows.zip
          - name: Linux
            os: ubuntu-latest
            script: build-user-generator.sh
            asset: programs-manager-user-generator-linux.tar.gz
          - name: macOS
            os: macos-latest
            script: build-mac-user-generator.sh
            asset: programs-manager-user-generator-macos.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: call ${{ matrix.script }}

      - name: Build on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x "${{ matrix.script }}"
          ./"${{ matrix.script }}"

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Compress-Archive -Path "dist/Programs Manager User Generator" -DestinationPath "release/${{ matrix.asset }}" -Force

      - name: Package Unix build
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release
          tar -czf "release/${{ matrix.asset }}" -C dist "Programs Manager User Generator"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: release/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish latest release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Move latest tag
        run: |
          git tag -f latest "$GITHUB_SHA"
          git push origin -f latest

      - name: Create or update latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest >/dev/null 2>&1; then
            gh release edit latest \
              --title "Latest Release" \
              --notes "Automatic build from main at $GITHUB_SHA." \
              --latest
          else
            gh release create latest \
              --title "Latest Release" \
              --notes "Automatic build from main at $GITHUB_SHA." \
              --latest
          fi

          gh release upload latest release/* --clobber
