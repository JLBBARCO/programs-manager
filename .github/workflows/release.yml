name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Build Multi-Platform Core App
      - Build Multi-Platform User Generator
    types: [completed]
    branches: [main, develop]

permissions:
  actions: read
  contents: write

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}

      - name: Resolve branch
        id: branch
        shell: bash
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          if [[ "$BRANCH" != "main" && "$BRANCH" != "develop" ]]; then
            echo "Unsupported branch: $BRANCH"
            exit 1
          fi
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          if [[ "$BRANCH" == "develop" ]]; then
            echo "version_key=Pre-release" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "latest=false" >> "$GITHUB_OUTPUT"
          else
            echo "version_key=Latest release" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "latest=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download workflow artifacts
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          path: release
          merge-multiple: true

      - name: Download current artifacts
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p release
          for workflow in "Build Multi-Platform Core App" "Build Multi-Platform User Generator"; do
            run_id="$(gh run list --workflow "$workflow" --branch "${{ steps.branch.outputs.name }}" --status success --limit 1 --json databaseId --jq '.[0].databaseId // empty')"
            if [[ -n "$run_id" ]]; then
              gh run download "$run_id" --dir release || true
            fi
          done
          find release -mindepth 2 -type f -exec mv -f {} release/ \;
          find release -mindepth 1 -type d -empty -delete

      - name: Check artifacts
        shell: bash
        run: |
          find release -maxdepth 1 -type f
          if ! find release -maxdepth 1 -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.pkg" \) | grep -q .; then
            echo "No release artifacts found."
            exit 1
          fi

      - name: Resolve version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        shell: bash
        run: |
          git fetch --tags --force

          # The version is named after the date/time the release was built,
          # and it's already embedded as version.txt inside every build
          # artifact (see build-core-app.yml / build-user-generator.yml).
          # Read it from there instead of tracking a separate file, so there
          # is nothing to keep in sync (or conflict) across branches.
          ASSET="$(find release -maxdepth 1 -type f \( -name "*.tar.gz" -o -name "*.zip" \) | sort | head -n 1)"
          if [[ -z "$ASSET" ]]; then
            echo "No release artifact found to read the version from."
            exit 1
          fi

          if [[ "$ASSET" == *.tar.gz ]]; then
            CURRENT="$(tar -xOzf "$ASSET" --wildcards '*/version.txt' 2>/dev/null | grep -m1 '^system_version=' | cut -d= -f2- | tr -d '\r' | xargs || true)"
          else
            CURRENT="$(unzip -p "$ASSET" '*/version.txt' 2>/dev/null | grep -m1 '^system_version=' | cut -d= -f2- | tr -d '\r' | xargs || true)"
          fi

          if [[ ! "$CURRENT" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]{6}$ ]]; then
            echo "Could not read a valid date/time version from $ASSET's version.txt: '$CURRENT'"
            exit 1
          fi

          # Extremely unlikely, but guard against two builds sharing the
          # exact same second: append a suffix rather than silently
          # overwriting an unrelated release.
          TAG="v$CURRENT"
          SUFFIX=0
          while gh release view "$TAG" >/dev/null 2>&1 || git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; do
            EXISTING_SHA="$(git rev-parse -q --verify "refs/tags/$TAG^{}" 2>/dev/null || true)"
            if [[ -n "$EXISTING_SHA" && "$EXISTING_SHA" == "$TARGET_SHA" ]]; then
              break
            fi
            SUFFIX=$((SUFFIX + 1))
            TAG="v${CURRENT}-r${SUFFIX}"
          done

          echo "value=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          TITLE="${{ steps.branch.outputs.version_key }} ${{ steps.version.outputs.value }}"
          NOTES="Automatic release from ${{ steps.branch.outputs.name }}."
          RELEASE_FLAGS=()
          if [[ "${{ steps.branch.outputs.prerelease }}" == "true" ]]; then
            RELEASE_FLAGS+=(--prerelease)
          else
            RELEASE_FLAGS+=(--latest)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES" "${RELEASE_FLAGS[@]}"
          else
            gh release create "$TAG" release/* --target "${{ github.event.workflow_run.head_sha || github.sha }}" --title "$TITLE" --notes "$NOTES" "${RELEASE_FLAGS[@]}"
            exit 0
          fi

          gh release upload "$TAG" release/* --clobber
